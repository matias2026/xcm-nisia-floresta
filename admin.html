<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - XCM Nísia Floresta</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #070a08;
  --panel: #101511;
  --panel-2: #151c17;
  --line: #273229;
  --green: #6cff3d;
  --green-dark: #35b91c;
  --text: #f4f7f4;
  --muted: #a4afa6;
  --danger: #ff5d5d;
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(108, 255, 61, 0.12), transparent 32%),
    linear-gradient(180deg, #050705 0%, var(--bg) 100%);
  color: var(--text);
}

.admin-shell {
  width: min(1400px, calc(100% - 32px));
  margin: 0 auto;
  padding: 32px 0 60px;
}

.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
}

.admin-brand small {
  display: block;
  color: var(--green);
  font-weight: 800;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.admin-brand h1 {
  margin: 0;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1;
}

.admin-brand p {
  margin: 10px 0 0;
  color: var(--muted);
}

.login-card,
.dashboard-card {
  background: rgba(16, 21, 17, 0.94);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: var(--shadow);
}

.login-card {
  width: min(460px, 100%);
  margin: 80px auto;
  padding: 32px;
}

.login-card h2 {
  margin-top: 0;
  font-size: 28px;
}

.login-card p {
  color: var(--muted);
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 700;
}

input {
  width: 100%;
  padding: 14px 15px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #0a0e0b;
  color: var(--text);
  outline: none;
}

input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(108, 255, 61, 0.12);
}

.actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button {
  border: 0;
  border-radius: 12px;
  padding: 12px 18px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
}

.btn-primary {
  background: var(--green);
  color: #081006;
}

.btn-primary:hover {
  background: #83ff5e;
}

.btn-secondary {
  background: var(--panel-2);
  color: var(--text);
  border: 1px solid var(--line);
}

.btn-danger {
  background: rgba(255, 93, 93, 0.12);
  color: #ff8d8d;
  border: 1px solid rgba(255, 93, 93, 0.35);
}

.dashboard-card {
  overflow: hidden;
}

.dashboard-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 20px;
  border-bottom: 1px solid var(--line);
}

.dashboard-toolbar h2 {
  margin: 0;
  font-size: 22px;
}

.dashboard-toolbar span {
  color: var(--muted);
  font-size: 14px;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 800px;
  border-collapse: collapse;
}

th,
td {
  padding: 15px 18px;
  text-align: left;
  border-bottom: 1px solid var(--line);
}

th {
  background: #0c110d;
  color: var(--green);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

td {
  color: #e9eee9;
}

tbody tr {
  transition: background 0.2s ease;
}

tbody tr:hover {
  background: rgba(108, 255, 61, 0.04);
}

.status-badge {
  display: inline-flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 999px;
  background: rgba(255, 199, 71, 0.12);
  color: #ffd66e;
  font-size: 12px;
  font-weight: 800;
}

.empty-state {
  padding: 32px;
  text-align: center;
  color: var(--muted);
}

@media (max-width: 720px) {
  .admin-shell {
    width: min(100% - 20px, 1400px);
    padding-top: 20px;
  }

  .admin-header,
  .dashboard-toolbar {
    align-items: flex-start;
    flex-direction: column;
  }

  .actions {
    width: 100%;
  }

  .actions button {
    flex: 1;
  }

  .login-card {
    margin: 30px auto;
    padding: 22px;
  }
}.status-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.status-badge {
  display: inline-flex;
  min-width: 82px;
  justify-content: center;
  padding: 7px 11px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
  text-transform: capitalize;
}

.status-pendente {
  background: rgba(255, 193, 7, 0.14);
  color: #ffd45c;
}

.status-pago {
  background: rgba(101, 209, 61, 0.14);
  color: #8cff65;
}

.status-cancelado {
  background: rgba(255, 83, 83, 0.14);
  color: #ff8181;
}

.status-cortesia {
  background: rgba(68, 158, 255, 0.14);
  color: #72b8ff;
}

.status-select {
  width: auto;
  min-width: 105px;
  height: 36px;
  padding: 0 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: #0a0e0b;
  color: var(--text);
}
</style>
</head>
<body>
<div class="admin-shell">

  <header class="admin-header">
    <div class="admin-brand">
      <small>XCM Nísia Floresta</small>
      <h1>Painel Administrativo</h1>
      <p>Gerencie inscrições e exporte os dados para Excel.</p>
    </div>
  </header>

  <div id="loginArea" class="login-card">
    <h2>Acesso restrito</h2>
    <p>Entre com seu usuário administrativo.</p>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seuemail@exemplo.com" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="Sua senha" autocomplete="new-password">
    </div>

    <button class="btn-primary" onclick="login()">Entrar no painel</button>
  </div>

  <div id="adminArea" style="display:none">

    <div class="dashboard-card">

      <div class="dashboard-toolbar">
        <div>
          <h2>Inscrições recebidas</h2>
          <span>Dados atualizados diretamente do Supabase</span>
        </div>

        <div class="actions">
          <button class="btn-secondary" onclick="carregarInscricoes()">
            Atualizar lista
          </button>

          <button class="btn-primary" onclick="exportarCSV()">
            Exportar Excel
          </button>

          <button class="btn-danger" onclick="logout()">
            Sair
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table id="tabela">
          <thead>
            <tr>
              <th>Código</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Categoria</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
